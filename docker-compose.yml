version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: s3os-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/s3os
      - SECRET_KEY=your-production-secret-key-change-this
      - DEBUG=false
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: s3os-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: postgres:15-alpine
    container_name: s3os-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=s3os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
